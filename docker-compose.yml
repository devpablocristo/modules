# Verificación de los paquetes de modules sin Node/Go en el host.
# Contexto de build: directorio padre (el que contiene `core/` y `modules/`).
#
# Desde modules/:
#   docker compose build

services:
  crud-ui-ts-check:
    build:
      context: ..
      dockerfile: modules/crud/ui/Dockerfile.ci-ts

  crud-paths-go-check:
    build:
      context: ..
      dockerfile: modules/crud/paths/Dockerfile.ci-go

  kanban-board-ts-check:
    build:
      context: ..
      dockerfile: modules/kanban/board/Dockerfile.ci-ts

  ui-data-display-ts-check:
    build:
      context: ..
      dockerfile: modules/ui/data-display/Dockerfile.ci-ts

  ui-filters-ts-check:
    build:
      context: ..
      dockerfile: modules/ui/filters/Dockerfile.ci-ts

  ui-forms-ts-check:
    build:
      context: ..
      dockerfile: modules/ui/forms/Dockerfile.ci-ts
